name: Org Repository Mirror

on:
  push:
    branches: [ main ]

jobs:
  mirror-to-org:
    # THE GATEKEEPER: Only run if the account executing this is the personal 'Eckohaus' account
    if: github.repository_owner == 'Eckohaus'
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Personal Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Inject Custom Domain (CNAME)
        run: |
          echo "eckohaus.co.uk" > CNAME
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CNAME
          git commit -m "chore: auto-inject CNAME for domain routing" || echo "CNAME already exists"

      - name: Push to Eckohaus-Ltd
        run: |
          git remote add org-repo https://${{ secrets.ORG_MIRROR_TOKEN }}@github.com/Eckohaus-Ltd/Formula-to-3D-Prototype-Engine-v2.git
          git push org-repo main --force
