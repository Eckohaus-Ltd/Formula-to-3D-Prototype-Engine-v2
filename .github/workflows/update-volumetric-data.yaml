name: Update Volumetric Data (IERS + Formulas)

on:
  schedule:
    # Monday–Friday at 02:00 UTC
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      IERS_SER7_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"
      IERS_DEBUG: "false"

    steps:

      # -----------------------------
      # Checkout the main branch
      # -----------------------------
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main

      # -----------------------------
      # Set up Python env
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      # -----------------------------
      # Generate datasets
      # -----------------------------
      - name: Generate IERS + Formula datasets
        env:
          IERS_SER7_URL: ${{ env.IERS_SER7_URL }}
          IERS_DEBUG: ${{ env.IERS_DEBUG }}
        run: |
          # Ensure directory exists
          mkdir -p docs/volumetric

          # Fetch IERS dataset → docs/volumetric/iers.json
          python engine/fetch_iers_data.py docs/volumetric/iers.json

          # Generate formula_a.json + formula_b.json
          python engine/compute.py

      # -----------------------------
      # Commit + push to main
      # -----------------------------
      - name: Commit & push changes
        shell: bash
        env:
          PAT_TOKEN: ${{ env.PAT_TOKEN }}
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          git add docs/volumetric/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): refresh volumetric datasets" \
            -m "Automated weekday update of IERS RS/PC dataset and regenerated formula_a.json / formula_b.json." \
            -m "Dataset modularised under docs/volumetric/ for cleaner pagination architecture." \
            -m "Co-authored-by: system operator <wanda@openai.com>" \
            -m "Co-authored-by: system administrator <Corvin Nehal Dhali> <info@eckohaus.co.uk>" \
            -m "Co-authored-by: GitHub Copilot <copilot@github.com>"

          git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" main
