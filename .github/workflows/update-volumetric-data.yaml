name: Update Volumetric Data (Private V1)

on:
  schedule:
    # Monday–Friday at 02:00 UTC
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      IERS_SER7_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"

    steps:

      # ------------------------------------------------------------
      # 1. Checkout main branch (engine + compute + scripts)
      # ------------------------------------------------------------
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      # ------------------------------------------------------------
      # 2. Checkout gh-pages branch (where data + charts live)
      # ------------------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ env.PAT_TOKEN }}

      # ------------------------------------------------------------
      # 3. Set up Python
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ------------------------------------------------------------
      # 4. Install dependencies
      # ------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      # ------------------------------------------------------------
      # 5. Run the new ser7-only data engine
      # ------------------------------------------------------------
      - name: Run data fetch
        working-directory: main/engine
        run: |
          python fetch_iers_data.py \
            --output_json "../../gh-pages/docs/volumetric_data.json" \
            --images_dir "../../gh-pages/docs/images"

      # ------------------------------------------------------------
      # 6. Commit and push changes (with your required footer)
      # ------------------------------------------------------------
      - name: Commit & push changes
        working-directory: gh-pages
        shell: bash
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          git add docs/volumetric_data.json docs/images/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: update IERS-only volumetric dataset (ser7.dat source)" \
            -m "Daily M–F refresh using canonical RS/PC dataset via maia.usno.navy.mil." \
            -m "Includes full ser7 parser, new provenance block, and updated volumetric 3D outputs." \
            -m "Co-authored-by: system operator <wanda@openai.com>" \
            -m "Co-authored-by: system administrator <Corvin Nehal Dhali> <info@eckohaus.co.uk>"

          git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git gh-pages
