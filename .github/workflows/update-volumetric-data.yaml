name: Update Volumetric Data (Private V1)

on:
  schedule:
    # Monday–Friday at 02:00 UTC
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      IERS_SER7_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"
      IERS_DEBUG: "true"

    steps:

      # --- MAIN CHECKOUT -----------------------------------------------------
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      # --- GH-PAGES CHECKOUT -------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ env.PAT_TOKEN }}

      # --- PYTHON SETUP ------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      # --- RUN FETCH ENGINE --------------------------------------------------
      - name: Run SER7 fetch engine
        working-directory: main/engine
        env:
          IERS_SER7_URL: ${{ env.IERS_SER7_URL }}
          IERS_DEBUG: "true"
        run: |
          python fetch_iers_data.py \
            --output_json "../../gh-pages/docs/volumetric_data.json" \
            --images_dir "../../gh-pages/docs/images"

      # --- COMMIT CHANGES ----------------------------------------------------
      - name: Commit & push changes
        working-directory: gh-pages
        shell: bash
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          # Stage dataset, images, debug logs
          git add docs/volumetric_data.json docs/images/ docs/ser7_raw_debug.txt || true

          # No change? Bail out politely
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: update IERS-only volumetric dataset (ser7.dat source)" \
            -m "Daily weekday refresh using canonical RS/PC SER7 dataset from maia.usno.navy.mil." \
            -m "Includes full debug capture (ser7_raw_debug.txt), improved parser logic, provenance block, and pre-rendered 3D charts." \
            -m "Co-authored-by: system operator <wanda@openai.com>" \
            -m "Co-authored-by: system administrator <Corvin Nehal Dhali> <info@eckohaus.co.uk>" \
            -m "Co-authored-by: GitHub Copilot <copilot-no-reply@github.com>"

          git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git gh-pages
