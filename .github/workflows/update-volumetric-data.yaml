name: Update Volumetric Data (Private V1)

on:
  schedule:
    # Run at 02:00 UTC, Monday–Friday only
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      # IERS data is public; EARTHDATA token removed
      IERS_SOURCE_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"

    steps:
      # 1. Checkout main
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      # 2. Checkout gh-pages with PAT
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ env.PAT_TOKEN }}
          path: gh-pages

      # 3. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 4. Install deps
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      # 5. Run IERS-only data fetch
      - name: Fetch IERS volumetric data
        working-directory: main/engine
        env:
          IERS_SOURCE_URL: ${{ env.IERS_SOURCE_URL }}
        run: |
          python fetch_iers_data.py \
            --source "$IERS_SOURCE_URL" \
            --output "../../gh-pages/docs/volumetric_data.json"

      # 6. Commit and push
      - name: Commit & push changes
        working-directory: gh-pages
