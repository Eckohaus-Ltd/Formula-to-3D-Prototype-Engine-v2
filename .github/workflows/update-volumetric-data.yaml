name: Update Volumetric Data (IERS RS/PC – ser7.dat)

on:
  schedule:
    # Monday–Friday at 02:00 UTC
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      IERS_SER7_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"
      IERS_DEBUG: "false"

    steps:

      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main
          path: main

      - name: Checkout gh-pages branch
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          token: ${{ env.PAT_TOKEN }}
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      - name: Fetch IERS + generate volumetric dataset
        working-directory: main/engine
        env:
          IERS_SER7_URL: ${{ env.IERS_SER7_URL }}
          IERS_DEBUG: ${{ env.IERS_DEBUG }}
        run: |
          python fetch_iers_data.py \
            --output_json "../../gh-pages/docs/volumetric_data.json" \
            --images_dir "../../gh-pages/docs/images"

      - name: Commit & push changes
        working-directory: gh-pages
        shell: bash
        env:
          PAT_TOKEN: ${{ env.PAT_TOKEN }}
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          git add docs/volumetric_data.json docs/images/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "feat(iers): update RS/PC dataset from ser7.dat" \
            -m "Automated weekday refresh using canonical USNO RS/PC source." \
            -m "Includes combined+prediction parsing, updated volumetric 3D output, and chart regeneration." \
            -m "Co-authored-by: system operator <wanda@openai.com>" \
            -m "Co-authored-by: system administrator <Corvin Nehal Dhali> <info@eckohaus.co.uk>" \
            -m "Co-authored-by: GitHub Copilot <copilot@github.com>"

          git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" gh-pages
