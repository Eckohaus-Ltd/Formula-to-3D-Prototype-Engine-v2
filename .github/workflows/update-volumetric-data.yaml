name: Update Volumetric Data (Private V1)

on:
  schedule:
    # Run at 02:00 UTC, Monday–Friday only
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN_FORMULA_3D_PUBLIC }}
      IERS_SER7_URL: "https://maia.usno.navy.mil/ser7/ser7.dat"

    steps:

      # ----------------------------
      # 1. Checkout main branch
      # ----------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      # ----------------------------
      # 2. Checkout gh-pages branch
      # ----------------------------
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ env.PAT_TOKEN }}
          path: gh-pages

      # ----------------------------
      # 3. Set up Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ----------------------------
      # 4. Install dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy plotly[kaleido]

      # ----------------------------
      # 5. Run IERS-only engine fetch
      # ----------------------------
      - name: Run IERS volumetric data pipeline
        working-directory: main/engine
        env:
          IERS_SOURCE_URL: ${{ env.IERS_SER7_URL }}
        run: |
          python fetch_iers_data.py \
            --output_json "../../gh-pages/docs/volumetric_data.json" \
            --images_dir "../../gh-pages/docs/images"

      # ----------------------------
      # 6. Commit & push changes
      # ----------------------------
      - name: Commit & push changes
        working-directory: gh-pages
        shell: bash
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          python - <<'EOF'
          import json, datetime, pathlib
          p = pathlib.Path("docs/volumetric_data.json")
          try:
              data = json.loads(p.read_text())
              if isinstance(data, dict):
                  data["last_test_run"] = datetime.datetime.now(
                      datetime.timezone.utc
                  ).isoformat()
                  p.write_text(json.dumps(data, indent=2))
          except Exception as e:
              print("⚠️ Could not append timestamp:", e)
          EOF

          git add docs/volumetric_data.json docs/images/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update IERS-only volumetric dataset (ser7.dat source)" \
              -m "Daily M–F refresh using canonical RS/PC dataset via maia.usno.navy.mil." \
              -m "Removes NASA/Earthdata dependency, aligns workflow with updated fetch engine and ser7 parsing." \
              -m "Co-authored-by: system operator <wanda@openai.com>" \
              -m "Co-authored-by: system administrator <Corvin Nehal Dhali> <info@eckohaus.co.uk>"
            git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git gh-pages
          fi
