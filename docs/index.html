<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Formula-to-3D Prototype Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Plotly for 3D rendering -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.5;
      background-color: #f8f9fa;
    }
    header {
      background-color: #0074D9;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      padding: 1rem;
      max-width: 1100px;
      margin: auto;
    }
    section {
      margin-bottom: 2rem;
    }
    .plot-container {
      width: 100%;
      height: 55vh;
      min-height: 300px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .description {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #333;
    }
    a {
      color: #0074D9;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1>Formula-to-3D Prototype Engine</h1>
</header>

<main>

  <!-- IERS Plot -->
  <section>
    <div class="plot-container" id="iersPlot"></div>
    <div class="description">
      <strong>IERS Earth Orientation Parameters (EOP)</strong><br>
      Data from <a href="https://www.iers.org" target="_blank">International Earth Rotation and Reference Systems Service</a><br>
      Combined RS/PC + Prediction Series (Bulletin A)
    </div>
  </section>

  <!-- Formula Plot -->
  <section>
    <div class="plot-container" id="formulaPlot"></div>
    <div class="description">
      <strong>Formula-Derived Volumetric Data</strong><br>
      Generated from <code>compute.py</code> within the engine.<br>
      Axes: <b>x</b>, <b>y</b>, <b>z</b>.
    </div>
  </section>

</main>

<script>
  /* Convert Modified Julian Date → approximate Gregorian year */
  function mjdToYear(mjd) {
    const mjdEpoch = new Date(Date.UTC(1858, 10, 17)); // 1858-11-17
    return new Date(mjdEpoch.getTime() + mjd * 86400000).getUTCFullYear();
  }

  /* Load JSON file */
  fetch('volumetric_data.json')
    .then(r => r.json())
    .then(data => {

      /* ------------------------------
         IERS EOP Dataset
      ------------------------------- */
      const combined = data?.iers?.combined_eop || [];
      const predictions = data?.iers?.predictions || [];
      const fullSeries = [...combined, ...predictions];

      if (fullSeries.length === 0) {
        document.getElementById('iersPlot').innerHTML = `
          <div style="padding: 1rem; text-align:center; color:#666;">
            <strong>IERS data unavailable.</strong><br>
            Only formula-derived data could be loaded.
          </div>`;
      } else {
        const iersXYZ = {
          x: fullSeries.map(p => p.x_arcsec),
          y: fullSeries.map(p => p.y_arcsec),
          z: fullSeries.map(p => p.mjd) // or mjdToYear(p.mjd)
        };

        Plotly.newPlot('iersPlot', [{
          x: iersXYZ.x,
          y: iersXYZ.y,
          z: iersXYZ.z,
          mode: 'markers',
          type: 'scatter3d',
          marker: {
            size: 3,
            color: iersXYZ.z,
            colorscale: 'Viridis',
            opacity: 0.85
          }
        }], {
          margin: { l: 0, r: 0, b: 0, t: 0 },
          scene: {
            xaxis: { title: 'x_pole (arcsec)' },
            yaxis: { title: 'y_pole (arcsec)' },
            zaxis: { title: 'MJD' }
          }
        });
      }

      /* ------------------------------
         Formula-derived Dataset
      ------------------------------- */
      const formula = data?.formula || [];
      const fXYZ = {
        x: formula.map(p => p.x),
        y: formula.map(p => p.y),
        z: formula.map(p => p.z)
      };

      Plotly.newPlot('formulaPlot', [{
        x: fXYZ.x,
        y: fXYZ.y,
        z: fXYZ.z,
        mode: 'markers',
        type: 'scatter3d',
        marker: {
          size: 3,
          color: fXYZ.z,
          colorscale: 'Plasma',
          opacity: 0.85
        }
      }], {
        margin: { l: 0, r: 0, b: 0, t: 0 },
        scene: {
          xaxis: { title: 'x' },
          yaxis: { title: 'y' },
          zaxis: { title: 'z' }
        }
      });

    })
    .catch(err => {
      console.error("JSON fetch error:", err);
      document.getElementById('iersPlot').innerHTML = `
        <div style="padding: 1rem; color: #b00; text-align:center;">
          <strong>Error loading volumetric_data.json.</strong><br>
          Check file path or network settings.
        </div>`;
    });
</script>

</body>
</html>
